services:
  postgre-db:
    image: postgres:18
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  adminer:
    image: adminer
    ports:
      - "8888:8080"
    depends_on:
      - postgre-db

  spring-boot-app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - postgre-db
    volumes:
      - article-data:/mediroh/articles #my path for articles
    environment:
      TZ: Europe/Bratislava #timezone for LocalDateTime
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_EMAIL_USERNAME: ${SPRING_EMAIL_USERNAME}
      SPRING_EMAIL_PASSWORD: ${SPRING_EMAIL_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

  react-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - spring-boot-app

volumes:
  postgres-data:
  article-data: